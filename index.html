    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --bg-app: #09090b;
            --bg-sidebar: #0c0c0e;
            --border-color: rgba(255, 255, 255, 0.06);
            --accent-glow: rgba(139, 92, 246, 0.15);
            --msg-user: #27272a; /* Zinc 800 */
            --msg-ai: rgba(39, 39, 42, 0.4); /* Zinc 800 with opacity */
        }

        body {
            background-color: var(--bg-app);
            color: #fafafa;
            font-family: 'Vazirmatn', system-ui, sans-serif;
            overflow: hidden; /* Prevent body scroll */
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* Language-Specific Typography */
        html[lang="en"] body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        html[lang="fa"] body { letter-spacing: 0; }

        /* Custom Scrollbar */
        .scroller { overflow-y: auto; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: #3f3f46 transparent; }
        .scroller::-webkit-scrollbar { width: 4px; }
        .scroller::-webkit-scrollbar-track { background: transparent; }
        .scroller::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 20px; }
        .scroller::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Glassmorphism Utilities */
        .glass {
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .glass-bubble {
            background: var(--msg-ai);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
        }

        /* Message Animations */
        @keyframes msgEnter {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .msg-anim { animation: msgEnter 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Thinking Animation (Wave) */
        .typing-dot {
            width: 4px; height: 4px; background-color: #a1a1aa; border-radius: 50%;
            animation: typingWave 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingWave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* Markdown Styling */
        .prose pre {
            background: #101014 !important;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            overflow-x: auto;
        }
        .prose code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            background: rgba(255,255,255,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            color: #e4e4e7;
        }
        .prose pre code { background: transparent; padding: 0; color: inherit; }
        .prose p { margin-bottom: 0.8rem; line-height: 1.75; }
        .prose ul { list-style: disc; padding-inline-start: 1.2rem; margin-bottom: 0.8rem; }
        .prose strong { color: #fff; font-weight: 600; }
        
        /* Input Focus Glow */
        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.4);
        }
    </style>
</head>

            marked.setOptions({
                highlight: (code, lang) => {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                breaks: true
            });

            // Auto-Resize Textarea

                this.style.height = '56px'; // Reset to min-height
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';

            el.input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!isLoading) el.form.dispatchEvent(new Event('submit'));

            // Using a timeout allows the DOM to repaint first
            setTimeout(() => {

        }

            const isClosed = el.sidebar.classList.contains('translate-x-full');

                el.sidebar.classList.remove('translate-x-full');
                el.overlay.classList.remove('hidden');
                setTimeout(() => el.overlay.classList.remove('opacity-0'), 10);

                el.sidebar.classList.add('translate-x-full');
                el.overlay.classList.add('opacity-0');
                setTimeout(() => el.overlay.classList.add('hidden'), 300);
            }

            // Thinking Content Logic

            if (isThinking) {
                const thinkingText = translations[currentLang].thinking;

                    <div class="flex gap-1"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
                </div>`;
            } else {
                htmlContent = isUser ? content.replace(/\n/g, '<br>') : marked.parse(content);
            }

            div.innerHTML = `
                <div class="flex gap-3 max-w-[85%] lg:max-w-[75%] ${isUser ? 'flex-row-reverse' : 'flex-row'}">
                    <div class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${isUser ? 'bg-zinc-700' : 'bg-violet-900/40 border border-violet-500/20'} mt-auto mb-1">
                        ${isUser 
                            ? `<svg class="w-4 h-4 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`
                            : `<svg class="w-4 h-4 text-violet-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`
                        }
                    </div>
                    <div class="flex flex-col gap-1 min-w-0 ${isUser ? 'items-end' : 'items-start'}">
                        <div class="${bubbleClass} px-5 py-3 text-[15px] lg:text-[16px] leading-relaxed overflow-hidden">
                            <div class="prose prose-invert max-w-none break-words">${htmlContent}</div>
                        </div>
                        ${!isUser && !isThinking ? `
                            <button onclick="copyToClipboard(this)" class="opacity-0 hover:opacity-100 transition-opacity text-[10px] text-zinc-500 hover:text-white flex items-center gap-1 px-1">
                                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                                <span class="copy-text">${translations[currentLang].copy}</span>
                            </button>
                            <div class="hidden source-text">${content}</div>
                        ` : ''}
                    </div>
                </div>
            `;
            return div;
        }

        // ==========================================
        // CHAT LOGIC
        // ==========================================
        async function sendMessage(text) {
            const cleanText = text.trim();
            if (!cleanText || isLoading) return;

            // UI Update
            el.welcome.classList.add('hidden');
            el.msgList.classList.remove('hidden');
            el.input.value = '';
            el.input.style.height = '56px';
            el.btn.disabled = true;
            isLoading = true;

            // Add User Message
            const userMsg = { role: 'user', content: cleanText };
            messages.push(userMsg);
            el.msgList.appendChild(createMessageElement('user', cleanText));
            scrollToBottom();

            // Show Thinking Indicator (as a message)
            const thinkingId = 'thinking-' + Date.now();
            const thinkingElem = createMessageElement('assistant', '', true);
            thinkingElem.id = thinkingId;
            el.msgList.appendChild(thinkingElem);
            scrollToBottom();

            try {
                const response = await fetch(CONFIG.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.apiKey}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Ravid Chat'
                    },
                    body: JSON.stringify({
                        model: CONFIG.model,
                        messages: [{ role: 'system', content: CONFIG.systemPrompt }, ...messages],
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // Remove Thinking, Add Real Message
                const thinkingNode = document.getElementById(thinkingId);
                if (thinkingNode) thinkingNode.remove();

                const aiMsg = { role: 'assistant', content: aiResponse };
                messages.push(aiMsg);
                el.msgList.appendChild(createMessageElement('assistant', aiResponse));
                
                // Highlight Code
                document.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
                
                saveToHistory();

            } catch (err) {
                console.error(err);
                const thinkingNode = document.getElementById(thinkingId);
                if (thinkingNode) thinkingNode.remove();
                el.msgList.appendChild(createMessageElement('assistant', `**Error:** ${translations[currentLang].error}`));
            } finally {
                isLoading = false;
                el.btn.disabled = false;
                el.input.focus();
                scrollToBottom();
            }
        }

        // ==========================================
        // SUGGESTIONS & HISTORY
        // ==========================================
        function renderSuggestions() {
            const list = translations[currentLang].suggestions;
            const container = el.suggestions;
            container.innerHTML = list.map(item => `
                <button onclick="fillAndSend('${item.p}')" class="text-right rtl:text-right ltr:text-left p-4 rounded-2xl border border-white/5 bg-[#121215] hover:bg-zinc-800 hover:border-violet-500/30 transition-all duration-300 group shadow-sm hover:shadow-lg">
                    <div class="text-sm font-semibold text-zinc-200 mb-1 group-hover:text-violet-300 transition-colors">${item.t}</div>
                    <div class="text-[11px] text-zinc-500 line-clamp-1">${item.d}</div>
                </button>
            `).join('');
        }

        window.fillAndSend = (text) => {
            sendMessage(text);
        };

        function saveToHistory() {
            if (messages.length === 0) return;
            const title = messages[0].content.substring(0, 40) + (messages[0].content.length > 40 ? '...' : '');
            const chat = { id: currentChatId || Date.now(), title, messages: [...messages] };
            
            const idx = chatHistory.findIndex(c => c.id === chat.id);
            if (idx > -1) chatHistory[idx] = chat; else chatHistory.unshift(chat);
            
            if (!currentChatId) currentChatId = chat.id;
            chatHistory = chatHistory.slice(0, 20); // Max 20 chats
            localStorage.setItem('ravidChatHistory', JSON.stringify(chatHistory));
            renderHistory();
        }

        function loadHistory() {
            const saved = localStorage.getItem('ravidChatHistory');
            if (saved) chatHistory = JSON.parse(saved);
            renderHistory();
        }

        function renderHistory() {
            el.history.innerHTML = chatHistory.map(chat => `
                <div onclick="restoreChat(${chat.id})" class="group flex items-center gap-2 p-2.5 rounded-xl hover:bg-white/5 cursor-pointer transition-colors relative overflow-hidden">
                    <svg class="w-4 h-4 text-zinc-600 group-hover:text-violet-400 shrink-0 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    <span class="text-xs text-zinc-400 group-hover:text-zinc-200 truncate flex-1 text-right rtl:text-right ltr:text-left">${chat.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat(${chat.id})" class="opacity-0 group-hover:opacity-100 p-1.5 hover:text-red-400 absolute left-2 rtl:left-2 ltr:right-2 bg-[#0c0c0e] shadow-lg rounded-md">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            `).join('');
        }

        window.restoreChat = (id) => {
            const chat = chatHistory.find(c => c.id === id);
            if (!chat) return;
            currentChatId = chat.id;
            messages = chat.messages;
            el.welcome.classList.add('hidden');
            el.msgList.classList.remove('hidden');
            el.msgList.innerHTML = '';
            messages.forEach(m => el.msgList.appendChild(createMessageElement(m.role, m.content)));
            document.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
            if (window.innerWidth < 1024) el.sidebar.classList.add('translate-x-full');
            scrollToBottom();
        };

        window.deleteChat = (id) => {
            chatHistory = chatHistory.filter(c => c.id !== id);
            localStorage.setItem('ravidChatHistory', JSON.stringify(chatHistory));
            renderHistory();
            if (currentChatId === id) startNewChat();
        };

        window.startNewChat = () => {
            messages = [];
            currentChatId = null;
            el.msgList.classList.add('hidden');
            el.welcome.classList.remove('hidden');
            el.msgList.innerHTML = '';
            if (window.innerWidth < 1024) el.sidebar.classList.add('translate-x-full');
            el.input.focus();
        };

        window.clearChat = () => {
            if (confirm(translations[currentLang].confirmClear)) window.startNewChat();
        };

        // ==========================================
        // HELPERS
        // ==========================================
        window.changeLanguage = (lang) => {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'fa') ? 'rtl' : 'ltr';
            localStorage.setItem('ravidChatLang', lang);

            // Update UI Strings
            document.querySelectorAll('[data-i18n]').forEach(e => {
                const key = e.getAttribute('data-i18n');
                if (translations[lang][key]) e.textContent = translations[lang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(e => {
                const key = e.getAttribute('data-i18n-placeholder');
                e.placeholder = translations[lang][key];
            });

            // Update Flag
            const flags = { fa: '🇮🇷', en: '🇺🇸', zh: '🇨🇳', ja: '🇯🇵' };
            const names = { fa: 'فارسی', en: 'English', zh: '中文', ja: '日本語' };
            document.getElementById('currentLangFlag').textContent = flags[lang];
            document.getElementById('currentLangName').textContent = names[lang];
            
            renderSuggestions();
            renderHistory();
        };

        function loadLanguagePreference() {
            const saved = localStorage.getItem('ravidChatLang');
            if (saved && translations[saved]) window.changeLanguage(saved);
        }

        window.copyToClipboard = (btn) => {
            const text = btn.nextElementSibling.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const span = btn.querySelector('.copy-text');
                const orig = span.textContent;
                span.textContent = translations[currentLang].copied;
                setTimeout(() => span.textContent = orig, 1500);
            });
        };

        el.form.addEventListener('submit', (e) => {
            e.preventDefault();
            sendMessage(el.input.value);
        });
    </script>
</body>
</html>
